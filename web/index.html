<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TALK</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/styles/github-dark.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/style.css?v=20260607-workbench-redesign">
</head>
<body class="app-shell bg-gray-900 text-gray-100 h-screen flex flex-col">

  <div id="login-overlay" class="fixed inset-0 flex items-center justify-center z-50">
    <div class="auth-card w-full max-w-md">
      <div class="auth-brand">
        <div class="brand-mark">T</div>
        <div>
          <h1>TALK</h1>
          <p>本地消息中转台</p>
        </div>
      </div>
      <p id="auth-loading" class="auth-loading">正在加载初始化状态…</p>

      <div id="setup-panel" class="auth-section hidden">
        <div class="auth-section-title">
          <p>创建第一个管理员</p>
          <span>首次启动</span>
        </div>
        <p class="auth-note">只有在数据库里还没有任何人类账号时，才会看到这个页面。</p>

        <label for="setup-id" class="auth-label">管理员 ID</label>
        <p class="auth-field-hint">格式必须以 <code>human:</code> 开头，例如 <code>human:home</code>。</p>
        <input id="setup-id" type="text" placeholder="human:home"
               class="auth-input mb-3">

        <label for="setup-name" class="auth-label">昵称</label>
        <input id="setup-name" type="text" placeholder="例如：Home"
               class="auth-input mb-3">

        <div class="auth-warning">
          <p>
            这是登录 TALK 的密钥，点“自动生成”让系统帮你生成。请把它记到密码管理器或可靠的地方，丢了就登不进来了。
          </p>
        </div>

        <label for="setup-key" class="auth-label">登录密钥</label>
        <div class="auth-key-row mb-2">
          <input id="setup-key" type="password" placeholder="点右侧“自动生成”"
                 class="auth-input flex-1">
          <button id="setup-key-generate-btn" type="button"
                  class="auth-secondary-btn shrink-0">
            自动生成
          </button>
        </div>
        <div class="flex items-center justify-between gap-2 mb-4">
          <button id="setup-key-toggle-btn" type="button"
                  class="auth-ghost-btn inline-flex items-center gap-2">
            <svg id="setup-key-eye-open" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7Z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
            <svg id="setup-key-eye-closed" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 3l18 18" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M10.584 10.587A2 2 0 0 0 13.414 13.4" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M9.88 5.09A9.953 9.953 0 0 1 12 4.875c4.478 0 8.268 2.943 9.542 7a9.963 9.963 0 0 1-4.207 5.153M6.228 6.231A9.965 9.965 0 0 0 2.458 12c1.274 4.057 5.064 7 9.542 7a9.96 9.96 0 0 0 5.158-1.43" />
            </svg>
            <span id="setup-key-toggle-label">显示</span>
          </button>
          <button id="setup-key-copy-btn" type="button"
                  class="auth-ghost-btn">
            复制
          </button>
        </div>
        <button id="setup-btn" class="setup-primary-btn auth-primary-btn">
          创建管理员
        </button>
        <p id="setup-error" class="auth-error hidden"></p>
      </div>

      <div id="login-panel" class="auth-section hidden">
        <div class="auth-section-title">
          <p>登录 TALK</p>
          <span>API Key</span>
        </div>
        <label for="login-key" class="auth-label">登录密钥</label>
        <input id="login-key" type="password" placeholder="粘贴你的登录密钥"
               class="auth-input mb-4">
        <button id="login-btn" class="auth-primary-btn">
          登录
        </button>
        <p id="login-error" class="auth-error hidden"></p>
      </div>
    </div>
  </div>

  <header class="app-header px-4 py-3 flex items-center justify-between shrink-0">
    <div class="app-title">
      <div class="brand-mark small">T</div>
      <div>
        <h1>TALK</h1>
        <p>Agent 协作工作台</p>
      </div>
    </div>
    <div class="header-actions">
      <span id="connection-status"
            class="hidden text-xs px-2 py-1 rounded-full border border-gray-600 text-gray-300 bg-gray-700">
      </span>
      <span id="user-badge" class="user-badge"></span>
      <button id="logout-btn" class="logout-btn">退出</button>
    </div>
  </header>

  <div class="chat-shell flex-1 min-h-0">
    <div class="workbench">
      <aside id="workspace-tools" class="workspace-tools">
        <div class="workspace-panel-heading">
          <div>
            <div class="workspace-kicker">Workspace</div>
            <h2>Hall 控制台</h2>
          </div>
          <span class="workspace-live-dot" aria-hidden="true"></span>
        </div>

      <section id="room-strip" class="room-strip hidden shrink-0">
        <div class="room-strip-row">
          <div class="room-current">
            <div id="room-title" class="room-title">全局消息流</div>
            <div id="room-description" class="room-description">旧全局聊天与私聊时间线</div>
          </div>
          <div class="room-actions">
            <button id="global-room-btn" type="button" class="room-chip active">全局</button>
            <div id="group-room-list" class="group-room-list"></div>
            <button id="refresh-groups-btn" type="button" class="room-icon-btn" title="刷新 Group 列表" aria-label="刷新 Group 列表">
              ↻
            </button>
            <button id="toggle-group-create-btn" type="button" class="room-create-btn">
              新建 Group
            </button>
            <button id="toggle-group-members-btn" type="button" class="room-create-btn hidden">
              成员
            </button>
          </div>
        </div>

        <form id="group-create-panel" class="group-create-panel hidden">
          <div class="group-create-grid">
            <label class="group-create-field">
              <span>名称</span>
              <input id="group-create-name" type="text" placeholder="例如：SDK 开发组" maxlength="80">
            </label>
            <label class="group-create-field">
              <span>ID（可选）</span>
              <input id="group-create-id" type="text" placeholder="group:sdk">
            </label>
            <label class="group-create-field wide">
              <span>描述（可选）</span>
              <input id="group-create-description" type="text" placeholder="这个 Hall 用来同步哪类工作">
            </label>
          </div>
          <div class="group-create-members-wrap">
            <div class="group-create-label">初始成员</div>
            <div id="group-create-members" class="group-create-members"></div>
          </div>
          <div class="group-create-footer">
            <p id="group-create-error" class="group-create-error hidden"></p>
            <div class="group-create-buttons">
              <button id="cancel-group-create-btn" type="button" class="room-secondary-btn">取消</button>
              <button id="submit-group-create-btn" type="submit" class="room-primary-btn">创建并进入</button>
            </div>
          </div>
        </form>

        <section id="group-members-panel" class="group-members-panel hidden">
          <div class="group-members-header">
            <div>
              <div class="group-members-title">Group 成员</div>
              <div id="group-members-subtitle" class="group-members-subtitle"></div>
            </div>
            <button id="close-group-members-btn" type="button" class="room-secondary-btn">收起</button>
          </div>
          <form id="group-meta-form" class="group-meta-form hidden">
            <label class="group-create-field">
              <span>Group 名称</span>
              <input id="group-meta-name" type="text" maxlength="80">
            </label>
            <label class="group-create-field">
              <span>描述</span>
              <input id="group-meta-description" type="text">
            </label>
            <button id="group-meta-save-btn" type="submit" class="room-primary-btn">保存</button>
          </form>
          <div id="group-members-list" class="group-members-list"></div>
          <form id="group-member-add-form" class="group-member-add-form hidden">
            <select id="group-member-add-select" class="group-member-select" aria-label="选择要加入 Group 的成员"></select>
            <select id="group-member-add-role" class="group-member-role-select" aria-label="选择成员角色">
              <option value="member">member</option>
              <option value="moderator">moderator</option>
              <option value="owner">owner</option>
            </select>
            <button id="group-member-add-btn" type="submit" class="room-primary-btn">添加成员</button>
          </form>
          <p id="group-members-error" class="group-create-error hidden"></p>
        </section>
      </section>

      <section id="presence-strip" class="hidden shrink-0">
        <div class="flex items-center gap-3 overflow-x-auto">
          <div id="presence-summary" class="presence-summary shrink-0">正在同步在线成员…</div>
          <div id="presence-members" class="presence-members"></div>
        </div>
      </section>

      </aside>

      <section class="timeline-workspace">
      <section id="history-toolbar" class="hidden shrink-0">
        <div class="history-toolbar-row">
          <div class="history-search-group">
            <input id="history-search-input" type="text" placeholder="搜索消息、附言或文件名"
                   class="history-search-input rounded-lg border border-gray-700 bg-gray-800 px-3 py-1.5 text-sm text-gray-100 focus:border-blue-500 focus:outline-none">
            <button id="history-search-btn"
                    class="history-btn rounded-lg border border-gray-700 px-3 py-1.5 text-sm text-gray-200 transition hover:border-gray-500 hover:text-white">
              搜索
            </button>
            <button id="history-clear-btn"
                    class="history-btn rounded-lg border border-gray-700 px-3 py-1.5 text-sm text-gray-200 transition hover:border-gray-500 hover:text-white">
              清除
            </button>
          </div>
          <div class="history-toolbar-actions">
            <button id="load-older-btn"
                    class="history-btn rounded-lg border border-gray-700 px-3 py-1.5 text-sm text-gray-200 transition hover:border-gray-500 hover:text-white">
              加载更早消息
            </button>
            <div id="history-status" class="history-status">就绪</div>
          </div>
        </div>
      </section>

      <main id="messages" class="flex-1 overflow-y-auto px-4 py-4 space-y-3"></main>

      <footer class="composer-footer px-4 py-3 shrink-0">
      <div id="composer" class="relative">
        <div id="drop-hint" class="drop-hint hidden">
          松开即可添加文件
        </div>
        <div id="pending-file" class="hidden mb-3 px-3 py-2 rounded-lg border border-blue-500 bg-gray-700 text-sm">
          <div class="flex items-center justify-between gap-3">
            <div class="min-w-0">
              <div id="pending-file-name" class="font-medium truncate"></div>
              <div id="pending-file-meta" class="text-xs text-gray-400"></div>
            </div>
            <button id="clear-file-btn" class="text-xs text-gray-400 hover:text-gray-200 transition">
              移除
            </button>
          </div>
        </div>
        <div id="reply-bar" class="hidden mb-3 px-3 py-2 rounded-lg border border-gray-600 bg-gray-700/80 text-sm">
          <div class="flex items-start justify-between gap-3">
            <div class="min-w-0">
              <div id="reply-author" class="reply-author"></div>
              <div id="reply-preview" class="reply-preview truncate"></div>
            </div>
            <button id="clear-reply-btn" class="text-xs text-gray-400 hover:text-gray-200 transition">
              取消回复
            </button>
          </div>
        </div>
        <div id="composer-status" class="hidden mb-3 px-3 py-2 rounded-lg text-sm border"></div>
        <div class="composer-row flex items-end gap-2 relative">
          <input id="file-input" type="file" class="hidden">
          <button id="attach-btn"
                  class="px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg font-medium transition border border-gray-600">
            文件
          </button>
          <div class="relative flex-1">
            <textarea id="msg-input"
                      placeholder="输入消息… 开头用 @ 指定接收者，不写则广播"
                      class="composer-textarea w-full px-4 py-3 bg-gray-700 rounded-lg border border-gray-600 focus:outline-none focus:border-blue-500"
                      rows="1"
                      autocomplete="off"></textarea>
            <ul id="mention-dropdown"
                class="absolute bottom-full left-0 mb-1 bg-gray-700 rounded-lg shadow-lg hidden max-h-48 overflow-y-auto w-64 border border-gray-600">
            </ul>
          </div>
          <button id="send-btn"
                  class="px-6 py-2 bg-blue-600 hover:bg-blue-700 rounded-lg font-medium transition">
            发送
          </button>
        </div>
      </div>
      </footer>
      </section>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.7/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/highlight.min.js"></script>
  <script src="/app.js?v=20260607-workbench-redesign"></script>
</body>
</html>
