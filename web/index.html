<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TALK</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/styles/github.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/style.css?v=20260611-ui-refine">
</head>
<body class="app-shell h-screen flex flex-col">

  <div id="login-overlay" class="fixed inset-0 flex items-center justify-center z-50">
    <div class="auth-card w-full max-w-md">
      <div class="auth-brand">
        <div class="brand-mark">T</div>
        <div>
          <h1>TALK</h1>
          <p>本地消息中转台</p>
        </div>
      </div>
      <p id="auth-loading" class="auth-loading">正在加载初始化状态...</p>

      <div id="setup-panel" class="auth-section hidden">
        <div class="auth-section-title">
          <p>创建第一个管理员</p>
          <span>首次启动</span>
        </div>
        <p class="auth-note">只有在数据库里还没有任何人类账号时，才会看到这个页面。</p>

        <label for="setup-id" class="auth-label">管理员 ID</label>
        <p class="auth-field-hint">格式必须以 <code>human:</code> 开头，例如 <code>human:home</code>。</p>
        <input id="setup-id" type="text" placeholder="human:home" class="auth-input mb-3">

        <label for="setup-name" class="auth-label">昵称</label>
        <input id="setup-name" type="text" placeholder="例如：Home" class="auth-input mb-3">

        <div class="auth-warning">
          <p>这是登录 TALK 的密钥，点“自动生成”让系统帮你生成。请把它记到密码管理器或可靠的地方，丢了就登不进来了。</p>
        </div>

        <label for="setup-key" class="auth-label">登录密钥</label>
        <div class="auth-key-row mb-2">
          <input id="setup-key" type="password" placeholder="点右侧“自动生成”" class="auth-input flex-1">
          <button id="setup-key-generate-btn" type="button" class="auth-secondary-btn shrink-0">自动生成</button>
        </div>
        <div class="flex items-center justify-between gap-2 mb-4">
          <button id="setup-key-toggle-btn" type="button" class="auth-ghost-btn inline-flex items-center gap-2">
            <svg id="setup-key-eye-open" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7Z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
            <svg id="setup-key-eye-closed" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 3l18 18" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M10.584 10.587A2 2 0 0 0 13.414 13.4" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M9.88 5.09A9.953 9.953 0 0 1 12 4.875c4.478 0 8.268 2.943 9.542 7a9.963 9.963 0 0 1-4.207 5.153M6.228 6.231A9.965 9.965 0 0 0 2.458 12c1.274 4.057 5.064 7 9.542 7a9.96 9.96 0 0 0 5.158-1.43" />
            </svg>
            <span id="setup-key-toggle-label">显示</span>
          </button>
          <button id="setup-key-copy-btn" type="button" class="auth-ghost-btn">复制</button>
        </div>
        <button id="setup-btn" class="setup-primary-btn auth-primary-btn">创建管理员</button>
        <p id="setup-error" class="auth-error hidden"></p>
      </div>

      <div id="login-panel" class="auth-section hidden">
        <div class="auth-section-title">
          <p>登录 TALK</p>
          <span>API Key</span>
        </div>
        <label for="login-key" class="auth-label">登录密钥</label>
        <input id="login-key" type="password" placeholder="粘贴你的登录密钥" class="auth-input mb-4">
        <button id="login-btn" class="auth-primary-btn">登录</button>
        <p id="login-error" class="auth-error hidden"></p>
      </div>
    </div>
  </div>

  <header class="app-header shrink-0">
    <div class="window-brand">
      <div class="brand-mark small">T</div>
      <div class="app-title">
        <h1>TALK</h1>
      </div>
    </div>
    <div class="header-actions">
      <span id="connection-status" class="hidden"></span>
      <span id="user-badge" class="user-badge"></span>
      <button id="logout-btn" class="logout-btn">退出</button>
    </div>
  </header>

  <div class="chat-shell flex-1 min-h-0">
    <div class="workbench">
      <aside id="workspace-tools" class="workspace-tools">
        <section id="room-strip" class="room-strip hidden">
          <div class="sidebar-heading">
            <h2>Hall 列表</h2>
            <div class="sidebar-actions">
              <button id="toggle-group-create-btn" type="button" class="icon-action" title="新建 Hall" aria-label="新建 Hall">＋</button>
              <button id="refresh-groups-btn" type="button" class="icon-action subtle hidden" title="刷新 Hall 列表" aria-label="刷新 Hall 列表">↻</button>
            </div>
          </div>
          <div class="hall-filter-shell">
            <span aria-hidden="true">⌕</span>
            <input id="hall-filter-input" type="text" placeholder="搜索 Hall / Agent / 人类成员" autocomplete="off">
          </div>
          <div class="quick-actions">
            <button id="global-room-btn" type="button" class="room-chip active">全局消息流</button>
          </div>
          <div id="group-room-list" class="group-room-list"></div>

          <form id="group-create-panel" class="group-create-panel hidden">
            <div class="group-create-grid">
              <label class="group-create-field">
                <span>名称</span>
                <input id="group-create-name" type="text" placeholder="例如：SDK 开发组" maxlength="80">
              </label>
              <label class="group-create-field">
                <span>ID（可选）</span>
                <input id="group-create-id" type="text" placeholder="group:sdk">
              </label>
              <label class="group-create-field wide">
                <span>描述（可选）</span>
                <input id="group-create-description" type="text" placeholder="这个 Hall 用来同步哪类工作">
              </label>
            </div>
            <div class="group-create-members-wrap">
              <div class="group-create-label">初始成员</div>
              <div id="group-create-members" class="group-create-members"></div>
            </div>
            <div class="group-create-footer">
              <p id="group-create-error" class="group-create-error hidden"></p>
              <div class="group-create-buttons">
                <button id="cancel-group-create-btn" type="button" class="room-secondary-btn">取消</button>
                <button id="submit-group-create-btn" type="submit" class="room-primary-btn">创建并进入</button>
              </div>
            </div>
          </form>
        </section>
      </aside>

      <section class="timeline-workspace">
        <header class="hall-header">
          <div class="hall-title-row">
            <div>
              <div class="hall-title-wrap">
                <h2 id="room-title" class="hall-title">全局消息流</h2>
                <span id="hall-group-id" class="hall-group-id hidden"></span>
              </div>
              <div id="room-description" class="room-description">旧全局聊天与私聊时间线</div>
            </div>
          </div>
          <section id="presence-strip" class="presence-strip hidden">
            <div class="presence-inline">
              <span id="presence-summary" class="presence-summary">正在同步在线成员...</span>
              <div id="presence-members" class="presence-members"></div>
            </div>
          </section>
          <section id="history-toolbar" class="history-toolbar hidden">
            <div class="history-toolbar-row">
              <div class="history-search-group">
                <input id="history-search-input" type="text" placeholder="搜索当前 Hall 消息" class="history-search-input">
                <button id="history-search-btn" class="history-btn primary">搜索</button>
                <button id="history-clear-btn" class="history-btn">清除</button>
              </div>
              <div class="history-toolbar-actions">
                <button id="load-older-btn" class="history-btn">加载更早消息</button>
                <div id="history-status" class="history-status">就绪</div>
              </div>
            </div>
          </section>
        </header>

        <main id="messages" class="flex-1 overflow-y-auto"></main>

        <footer class="composer-footer shrink-0">
          <div id="composer" class="relative">
            <div id="drop-hint" class="drop-hint hidden">松开即可添加文件</div>
            <div id="pending-file" class="pending-file hidden">
              <div class="pending-file-inner">
                <div class="min-w-0">
                  <span class="pending-label">待发送文件：</span>
                  <span id="pending-file-name" class="font-medium truncate"></span>
                  <span id="pending-file-meta" class="pending-meta"></span>
                </div>
                <button id="clear-file-btn" class="clear-file-btn">移除</button>
              </div>
            </div>
            <div id="reply-bar" class="reply-bar hidden">
              <div class="flex items-start justify-between gap-3">
                <div class="min-w-0">
                  <div id="reply-author" class="reply-author"></div>
                  <div id="reply-preview" class="reply-preview truncate"></div>
                </div>
                <button id="clear-reply-btn" class="clear-reply-btn">取消回复</button>
              </div>
            </div>
            <div id="composer-status" class="composer-status hidden"></div>
            <div class="composer-row">
              <input id="file-input" type="file" class="hidden">
              <div class="relative flex-1">
                <textarea id="msg-input"
                          placeholder="输入 Hall 消息..."
                          class="composer-textarea"
                          rows="1"
                          autocomplete="off"></textarea>
                <ul id="mention-dropdown" class="mention-dropdown hidden"></ul>
              </div>
              <div class="composer-actions">
                <button id="attach-btn" class="tool-chip" type="button">文件</button>
                <button id="send-btn" class="send-btn" type="button">发送</button>
              </div>
            </div>
          </div>
        </footer>
      </section>

      <aside class="details-panel">
        <section id="group-members-panel" class="group-members-panel hidden">
          <div class="details-card">
            <div class="details-card-header">
              <div>
                <h3>当前 Hall 成员</h3>
                <div id="group-members-subtitle" class="group-members-subtitle"></div>
              </div>
              <button id="toggle-group-members-btn" type="button" class="icon-action" title="添加成员" aria-label="添加成员">＋</button>
              <button id="close-group-members-btn" type="button" class="room-secondary-btn hidden">收起</button>
            </div>
            <form id="group-meta-form" class="group-meta-form hidden">
              <label class="group-create-field">
                <span>Hall 名称</span>
                <input id="group-meta-name" type="text" maxlength="80">
              </label>
              <label class="group-create-field">
                <span>描述</span>
                <input id="group-meta-description" type="text">
              </label>
              <button id="group-meta-save-btn" type="submit" class="room-primary-btn">保存</button>
            </form>
            <div id="group-members-list" class="group-members-list"></div>
            <form id="group-member-add-form" class="group-member-add-form hidden">
              <select id="group-member-add-select" class="group-member-select" aria-label="选择要加入 Hall 的成员"></select>
              <select id="group-member-add-role" class="group-member-role-select" aria-label="选择成员角色">
                <option value="member">member</option>
                <option value="moderator">moderator</option>
                <option value="owner">owner</option>
              </select>
              <button id="group-member-add-btn" type="submit" class="room-primary-btn">添加成员</button>
            </form>
            <p id="group-members-error" class="group-create-error hidden"></p>
          </div>
          <div class="details-card all-members-card">
            <div class="details-card-header compact">
              <h3>所有成员</h3>
              <span class="details-hint">点角色筛选</span>
            </div>
            <div id="all-members-list" class="all-members-list"></div>
          </div>
        </section>
      </aside>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.7/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/highlight.min.js"></script>
  <script src="/app.js?v=20260611-ui-refine"></script>
</body>
</html>
